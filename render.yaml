services:
  - type: web
    name: flappy-ekip
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: game-data
      mountPath: /data
      sizeGB: 1
