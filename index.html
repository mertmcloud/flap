<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Ekip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;width:100vw;display:flex;justify-content:center;align-items:center;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  canvas{display:block;border-radius:12px;box-shadow:0 0 60px rgba(50,200,255,.15);cursor:pointer;touch-action:manipulation}
  #nameOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10;justify-content:center;align-items:center;flex-direction:column}
  #nameOverlay.show{display:flex}
  #nameOverlay .box{background:#0f0f2a;border:2px solid rgba(0,212,255,.4);border-radius:20px;padding:28px 32px;text-align:center;max-width:340px;width:90%}
  #nameOverlay h2{color:#00d4ff;font-family:'Fredoka One',cursive;font-size:22px;margin:0 0 6px}
  #nameOverlay .scoreTxt{color:#fff;font-size:32px;font-family:'Fredoka One',cursive;margin:0 0 16px}
  #nameOverlay input{width:100%;padding:10px 14px;border:2px solid rgba(0,212,255,.4);border-radius:10px;background:rgba(255,255,255,.05);color:#fff;font-size:16px;font-family:'Nunito',sans-serif;outline:none;margin-bottom:14px;text-align:center}
  #nameOverlay input::placeholder{color:rgba(200,220,255,.35)}
  #nameOverlay input:focus{border-color:#00d4ff}
  #nameOverlay button{padding:10px 28px;border:none;border-radius:10px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin:0 6px}
  #nameOverlay .saveBtn{background:#00d4ff;color:#0a0a2e}
  #nameOverlay .skipBtn{background:rgba(255,255,255,.1);color:#00d4ff;border:1.5px solid rgba(0,212,255,.4)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="nameOverlay">
  <div class="box">
    <h2>Oyun Bitti!</h2>
    <div class="scoreTxt" id="finalScore">0</div>
    <input type="text" id="playerName" placeholder="Adınızı girin..." maxlength="20" autocomplete="off">
    <div>
      <button class="saveBtn" id="saveScoreBtn">Kaydet</button>
      <button class="skipBtn" id="skipBtn">Atla</button>
    </div>
  </div>
</div>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  const maxW=480,maxH=720,ratio=maxW/maxH;
  let w=window.innerWidth,h=window.innerHeight;
  if(w/h>ratio)w=h*ratio;else h=w/ratio;
  canvas.width=Math.min(w,maxW);canvas.height=Math.min(h,maxH);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

// Load images
let loadedCount=0;
const totalAssets=characters.length;
characters.forEach(c=>{
  c.img=new Image();
  c.img.onload=()=>{loadedCount++;if(loadedCount>=totalAssets)init();};
  c.img.onerror=()=>{loadedCount++;c.img=null;if(loadedCount>=totalAssets)init();};
  c.img.src=c.src;
});

// Audio
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();if(audioCtx.state==='suspended')audioCtx.resume();}
function playSound(type){
  if(!audioCtx)return;
  try{
    const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    const now=audioCtx.currentTime;
    if(type==='flap'){osc.type='sine';osc.frequency.setValueAtTime(420,now);osc.frequency.exponentialRampToValueAtTime(560,now+.08);gain.gain.setValueAtTime(.15,now);gain.gain.exponentialRampToValueAtTime(.001,now+.12);osc.start(now);osc.stop(now+.12);}
    else if(type==='score'){osc.type='triangle';osc.frequency.setValueAtTime(587,now);osc.frequency.setValueAtTime(784,now+.08);gain.gain.setValueAtTime(.18,now);gain.gain.exponentialRampToValueAtTime(.001,now+.25);osc.start(now);osc.stop(now+.25);}
    else if(type==='hit'){osc.type='sawtooth';osc.frequency.setValueAtTime(200,now);osc.frequency.exponentialRampToValueAtTime(50,now+.3);gain.gain.setValueAtTime(.2,now);gain.gain.exponentialRampToValueAtTime(.001,now+.3);osc.start(now);osc.stop(now+.3);}
    else if(type==='select'){osc.type='sine';osc.frequency.setValueAtTime(330,now);osc.frequency.setValueAtTime(440,now+.06);osc.frequency.setValueAtTime(550,now+.12);gain.gain.setValueAtTime(.12,now);gain.gain.exponentialRampToValueAtTime(.001,now+.2);osc.start(now);osc.stop(now+.2);}
  }catch(e){}
}

const STATE={LOADING:0,SELECT:1,READY:2,PLAYING:3,GAMEOVER:4,LEADERBOARD:5};
let state=STATE.LOADING, selectedChar=null, selectScroll=0, selectHover=-1, touchStartY=0;
let playerName='Oyuncu';

// Leaderboard
let cachedLeaderboard=[];
function getLeaderboard(){return cachedLeaderboard;}
async function fetchLeaderboard(){try{const r=await fetch('/api/scores');if(r.ok){cachedLeaderboard=await r.json();}}catch(e){console.error('Skor tablosu yüklenemedi:',e);}}
async function saveToLeaderboard(name,sc,charName){
  try{
    console.log('[DEBUG] saveToLeaderboard çağrıldı, skor:', sc, 'tip:', typeof sc);
    const body={name:name||'Anonim',score:sc,char:charName};
    console.log('[DEBUG] Gönderilen body:', JSON.stringify(body));
    const r=await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    console.log('[DEBUG] Yanıt status:', r.status, r.ok);
    if(r.ok){cachedLeaderboard=await r.json();console.log('[DEBUG] cachedLeaderboard güncellendi, uzunluk:', cachedLeaderboard.length);}
    else{const txt=await r.text();console.error('[DEBUG] Sunucu hatası:', r.status, txt);}
  }catch(e){console.error('[DEBUG] Skor kaydedilemedi:',e);}
}
let _savedScore=0;
function showNameOverlay(sc){
  _savedScore=sc;
  console.log('[DEBUG] showNameOverlay çağrıldı, sc:', sc, 'global score:', score);
  document.getElementById('finalScore').textContent=sc;
  document.getElementById('playerName').value=playerName!=='Oyuncu'?playerName:'';
  const ov=document.getElementById('nameOverlay');ov.classList.add('show');
  setTimeout(()=>document.getElementById('playerName').focus(),100);
}
function hideNameOverlay(){document.getElementById('nameOverlay').classList.remove('show');}
document.getElementById('saveScoreBtn').addEventListener('click',async()=>{
  const n=document.getElementById('playerName').value.trim()||'Anonim';
  playerName=n;await saveToLeaderboard(n,_savedScore,selectedChar?selectedChar.name:'?');hideNameOverlay();state=STATE.LEADERBOARD;
});
document.getElementById('skipBtn').addEventListener('click',()=>{hideNameOverlay();state=STATE.LEADERBOARD;});
document.getElementById('playerName').addEventListener('keydown',e=>{
  if(e.key==='Enter'){document.getElementById('saveScoreBtn').click();}
});

// EASIER game constants
let bird,pipes,score,highScore,groundX,particles,flashAlpha,shakeDur;
const GRAVITY=0.15, FLAP_VEL=-4.2, MAX_FALL=3.5, PIPE_SPEED=1.8, PIPE_GAP=190, PIPE_WIDTH=58, PIPE_FREQ=125, GROUND_H=80;
let frameCount=0,pipeTimer=0;

let clouds=[], stars=[];
function initClouds(){clouds=[];for(let i=0;i<5;i++)clouds.push({x:Math.random()*canvas.width*1.5,y:30+Math.random()*(canvas.height*.35),w:50+Math.random()*80,speed:.2+Math.random()*.4,alpha:.15+Math.random()*.2});}
function initStars(){stars=[];for(let i=0;i<40;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*(canvas.height-GROUND_H-100),r:.5+Math.random()*1.5,twinkle:Math.random()*Math.PI*2});}

highScore=parseInt(localStorage.getItem('flappyEkipHS')||'0',10);

function resetGame(){
  const cw=canvas.width,ch=canvas.height;
  bird={x:cw*.25,y:ch*.4,w:44,h:44,vel:0,rotation:0};
  pipes=[];score=0;groundX=0;frameCount=0;pipeTimer=0;_lastTime=0;particles=[];flashAlpha=0;shakeDur=0;
}

function spawnParticles(x,y,count,color){
  for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:30+Math.random()*20,maxLife:30+Math.random()*20,r:2+Math.random()*3,color});
}

// Character select
function getCharGrid(){
  const cw=canvas.width,cols=3,cardW=110,cardH=130,gapX=16,gapY=16;
  const totalRowW=cols*cardW+(cols-1)*gapX,startX=(cw-totalRowW)/2,startY=180+selectScroll;
  return characters.map((c,i)=>{const col=i%cols,row=Math.floor(i/cols);return{x:startX+col*(cardW+gapX),y:startY+row*(cardH+gapY),w:cardW,h:cardH,char:c,index:i};});
}

function drawSelectScreen(){
  const cw=canvas.width,ch=canvas.height;
  const grad=ctx.createLinearGradient(0,0,0,ch);grad.addColorStop(0,'#0b0b2e');grad.addColorStop(.5,'#141452');grad.addColorStop(1,'#1a1a3e');ctx.fillStyle=grad;ctx.fillRect(0,0,cw,ch);
  stars.forEach(s=>{s.twinkle+=.03*currentDt;ctx.globalAlpha=.3+Math.sin(s.twinkle)*.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,Math.max(s.r,0.1),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  ctx.save();ctx.textAlign='center';ctx.shadowColor='#00d4ff';ctx.shadowBlur=30;ctx.fillStyle='#00d4ff';ctx.font=`900 ${Math.min(42,cw*.09)}px 'Fredoka One',cursive`;ctx.fillText('FLAPPY EKİP',cw/2,60);ctx.shadowBlur=0;
  ctx.font=`700 ${Math.min(18,cw*.04)}px 'Nunito',sans-serif`;ctx.fillStyle='rgba(200,220,255,.6)';ctx.fillText('Karakterini Seç',cw/2,95);ctx.restore();
  const lineGrad=ctx.createLinearGradient(cw*.2,0,cw*.8,0);lineGrad.addColorStop(0,'transparent');lineGrad.addColorStop(.5,'rgba(0,212,255,.5)');lineGrad.addColorStop(1,'transparent');ctx.strokeStyle=lineGrad;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cw*.15,110);ctx.lineTo(cw*.85,110);ctx.stroke();
  const grid=getCharGrid();
  grid.forEach((card,i)=>{
    if(card.y+card.h<120||card.y>ch)return;
    const isHover=selectHover===i, pulse=isHover?4+Math.sin(Date.now()/150)*2:0;
    ctx.save();const r=14;
    if(isHover){ctx.shadowColor='#00d4ff';ctx.shadowBlur=20;}
    ctx.fillStyle=isHover?'rgba(0,212,255,.15)':'rgba(255,255,255,.05)';ctx.beginPath();ctx.roundRect(card.x-pulse/2,card.y-pulse/2,card.w+pulse,card.h+pulse,r);ctx.fill();
    ctx.strokeStyle=isHover?'rgba(0,212,255,.7)':'rgba(255,255,255,.1)';ctx.lineWidth=isHover?2:1;ctx.stroke();ctx.shadowBlur=0;
    const imgSize=60,imgX=card.x+(card.w-imgSize)/2,imgY=card.y+12;
    ctx.save();ctx.beginPath();ctx.arc(imgX+imgSize/2,imgY+imgSize/2,imgSize/2,0,Math.PI*2);ctx.clip();
    if(card.char.img){ctx.drawImage(card.char.img,imgX,imgY,imgSize,imgSize);}else{ctx.fillStyle='#333';ctx.fillRect(imgX,imgY,imgSize,imgSize);}
    ctx.restore();
    ctx.strokeStyle=isHover?'#00d4ff':'rgba(255,255,255,.2)';ctx.lineWidth=isHover?2.5:1.5;ctx.beginPath();ctx.arc(imgX+imgSize/2,imgY+imgSize/2,imgSize/2+1,0,Math.PI*2);ctx.stroke();
    ctx.textAlign='center';ctx.font=`700 11px 'Nunito',sans-serif`;ctx.fillStyle=isHover?'#00d4ff':'rgba(220,230,255,.85)';
    const dn=card.char.name.length>14?card.char.name.slice(0,13)+'..':card.char.name;ctx.fillText(dn,card.x+card.w/2,card.y+card.h-14);
    ctx.restore();
  });
  ctx.textAlign='center';ctx.font='600 12px Nunito,sans-serif';ctx.fillStyle='rgba(200,220,255,.3)';ctx.fillText('Bir karakter seç ve oyna!',cw/2,ch-20);
}

function drawBackground(){
  const cw=canvas.width,ch=canvas.height;
  const grad=ctx.createLinearGradient(0,0,0,ch-GROUND_H);grad.addColorStop(0,'#1a1a4e');grad.addColorStop(.4,'#2d2d7a');grad.addColorStop(.7,'#4a3080');grad.addColorStop(1,'#e86040');ctx.fillStyle=grad;ctx.fillRect(0,0,cw,ch-GROUND_H);
  stars.forEach(s=>{s.twinkle+=.02*currentDt;ctx.globalAlpha=.2+Math.sin(s.twinkle)*.25;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,Math.max(s.r,0.1),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  clouds.forEach(c=>{c.x-=c.speed*currentDt;if(c.x+c.w<0){c.x=cw+c.w;c.y=30+Math.random()*(ch*.35);}ctx.globalAlpha=c.alpha;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(c.x,c.y,c.w/2,c.w/4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(c.x-c.w*.25,c.y+5,c.w/3,c.w/5,0,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
}

function drawGround(){
  const cw=canvas.width,ch=canvas.height,gy=ch-GROUND_H;
  const gGrad=ctx.createLinearGradient(0,gy,0,ch);gGrad.addColorStop(0,'#5a8a3c');gGrad.addColorStop(.05,'#4a7a30');gGrad.addColorStop(1,'#2a4a18');ctx.fillStyle=gGrad;ctx.fillRect(0,gy,cw,GROUND_H);
  ctx.strokeStyle='#6aaa44';ctx.lineWidth=2;
  for(let x=(groundX%20)-20;x<cw+20;x+=20){ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x+5,gy-6);ctx.stroke();ctx.beginPath();ctx.moveTo(x+10,gy);ctx.lineTo(x+14,gy-4);ctx.stroke();}
  ctx.fillStyle='#7cc850';ctx.fillRect(0,gy,cw,4);
}

function drawSinglePipe(x,y,w,h){
  if(h<=0)return;
  const pGrad=ctx.createLinearGradient(x,0,x+w,0);pGrad.addColorStop(0,'#2eaa3e');pGrad.addColorStop(.3,'#3ed458');pGrad.addColorStop(.7,'#3ed458');pGrad.addColorStop(1,'#1e8a2e');ctx.fillStyle=pGrad;ctx.fillRect(x,y,w,h);
  ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(x+6,y,8,h);ctx.strokeStyle='#1a6a22';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
  const capH=20,capW=w+12,capX=x-6;let capY;
  if(y===0)capY=h-capH;else capY=y;
  const cGrad=ctx.createLinearGradient(capX,0,capX+capW,0);cGrad.addColorStop(0,'#28993a');cGrad.addColorStop(.3,'#44e860');cGrad.addColorStop(.7,'#44e860');cGrad.addColorStop(1,'#1e7a2a');ctx.fillStyle=cGrad;ctx.beginPath();ctx.roundRect(capX,capY,capW,capH,4);ctx.fill();ctx.strokeStyle='#1a6a22';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(capX,capY,capW,capH,4);ctx.stroke();
}

function drawPipe(p){
  const gy=canvas.height-GROUND_H;
  drawSinglePipe(p.x,0,PIPE_WIDTH,p.topH);
  drawSinglePipe(p.x,p.topH+PIPE_GAP,PIPE_WIDTH,gy-p.topH-PIPE_GAP);
}

function drawBird(){
  ctx.save();
  const bx=bird.x+bird.w/2,by=bird.y+bird.h/2,r=bird.w/2;
  ctx.translate(bx,by);
  let angle=Math.max(-30,Math.min(70,bird.vel*3));
  ctx.rotate(angle*Math.PI/180);
  ctx.shadowColor='rgba(255,200,50,.4)';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(0,0,Math.max(r,0.1),0,Math.PI*2);ctx.clip();
  if(selectedChar&&selectedChar.img){ctx.drawImage(selectedChar.img,-r,-r,bird.w,bird.h);}else{ctx.fillStyle='#ffcc00';ctx.fillRect(-r,-r,bird.w,bird.h);}
  ctx.restore();
  ctx.save();ctx.translate(bx,by);ctx.rotate(Math.max(-30,Math.min(70,bird.vel*3))*Math.PI/180);
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,Math.max(r+1,0.1),0,Math.PI*2);ctx.stroke();ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{p.x+=p.vx*currentDt;p.y+=p.vy*currentDt;p.vy+=.1*currentDt;p.life-=currentDt;
    const a=Math.max(p.life/p.maxLife,0);ctx.globalAlpha=a;ctx.fillStyle=p.color;
    const pr=Math.max(p.r*a,0.01);ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;particles=particles.filter(p=>p.life>0);
}

function drawScore(){
  const cw=canvas.width;ctx.save();ctx.textAlign='center';ctx.font=`900 ${Math.min(56,cw*.12)}px 'Fredoka One',cursive`;
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillText(score,cw/2+2,72);ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=6;ctx.fillText(score,cw/2,70);ctx.restore();
}

function drawReadyScreen(){
  const cw=canvas.width,ch=canvas.height;ctx.save();ctx.textAlign='center';
  ctx.font='800 22px "Fredoka One",cursive';ctx.fillStyle='#00d4ff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=15;ctx.fillText(selectedChar.name,cw/2,ch*.22);ctx.shadowBlur=0;
  const pulse=.85+Math.sin(Date.now()/300)*.15;ctx.globalAlpha=pulse;ctx.font=`800 ${Math.min(20,cw*.045)}px Nunito,sans-serif`;ctx.fillStyle='#fff';ctx.fillText('Başlamak için tıkla / dokun',cw/2,ch*.7);
  ctx.globalAlpha=.5;ctx.font='600 13px Nunito,sans-serif';ctx.fillText('Boşluk tuşu veya ekrana dokun',cw/2,ch*.7+28);ctx.globalAlpha=1;
  if(highScore>0){ctx.font='700 14px Nunito,sans-serif';ctx.fillStyle='rgba(255,215,0,.7)';ctx.fillText(`En Yüksek Skor: ${highScore}`,cw/2,ch*.82);}
  ctx.restore();
}

let _retryBtn=null, _charBtn=null;
function drawLeaderboard(){
  const cw=canvas.width,ch=canvas.height;
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,cw,ch);
  const pw=Math.min(360,cw*.85),ph=Math.min(480,ch*.7),px=(cw-pw)/2,py=(ch-ph)/2-10;
  ctx.fillStyle='rgba(10,10,40,.95)';ctx.beginPath();ctx.roundRect(px,py,pw,ph,20);ctx.fill();
  ctx.strokeStyle='rgba(0,212,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(px,py,pw,ph,20);ctx.stroke();
  ctx.save();ctx.textAlign='center';
  ctx.font=`900 ${Math.min(26,cw*.055)}px 'Fredoka One',cursive`;ctx.fillStyle='#00d4ff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=15;ctx.fillText('🏆 Liderlik Tablosu',cw/2,py+38);ctx.shadowBlur=0;
  const lb=getLeaderboard();
  const startY=py+62,lineH=28,maxShow=Math.min(lb.length,10);
  ctx.font='700 12px Nunito,sans-serif';ctx.fillStyle='rgba(200,220,255,.4)';
  ctx.textAlign='left';ctx.fillText('#',px+16,startY);ctx.fillText('İsim',px+40,startY);ctx.textAlign='right';ctx.fillText('Skor',px+pw-16,startY);
  for(let i=0;i<maxShow;i++){
    const e=lb[i],yy=startY+lineH*(i+1);
    const isMe=(e.score===score&&e.name===playerName);
    ctx.textAlign='left';
    ctx.fillStyle=isMe?'#ffdd44':i<3?'#00d4ff':'rgba(220,230,255,.75)';
    ctx.font=isMe?'800 13px Nunito,sans-serif':'600 13px Nunito,sans-serif';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':String(i+1);
    ctx.fillText(medal,px+14,yy);
    const displayN=e.name.length>12?e.name.slice(0,11)+'…':e.name;
    ctx.fillText(displayN,px+42,yy);
    ctx.textAlign='right';ctx.fillText(e.score,px+pw-16,yy);
  }
  if(lb.length===0){ctx.textAlign='center';ctx.fillStyle='rgba(200,220,255,.3)';ctx.font='600 14px Nunito,sans-serif';ctx.fillText('Henüz skor yok',cw/2,startY+40);}
  // Buttons
  const btnW=130,btnH=38,gap=12;
  const btn1X=cw/2-btnW-gap/2,btn1Y=py+ph-56;
  ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.roundRect(btn1X,btn1Y,btnW,btnH,10);ctx.fill();
  ctx.textAlign='center';ctx.font='800 14px Nunito,sans-serif';ctx.fillStyle='#0a0a2e';ctx.fillText('Tekrar Oyna',btn1X+btnW/2,btn1Y+25);
  const btn2X=cw/2+gap/2;
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.roundRect(btn2X,btn1Y,btnW,btnH,10);ctx.fill();
  ctx.strokeStyle='rgba(0,212,255,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(btn2X,btn1Y,btnW,btnH,10);ctx.stroke();
  ctx.font='700 13px Nunito,sans-serif';ctx.fillStyle='#00d4ff';ctx.fillText('Karakter Değiştir',btn2X+btnW/2,btn1Y+25);
  ctx.restore();
  _retryBtn={x:btn1X,y:btn1Y,w:btnW,h:btnH};
  _charBtn={x:btn2X,y:btn1Y,w:btnW,h:btnH};
}

function drawFlash(){if(flashAlpha>0){ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;ctx.fillRect(0,0,canvas.width,canvas.height);flashAlpha-=.06*currentDt;}}

function checkCollision(){
  const ch=canvas.height,gy=ch-GROUND_H,bx=bird.x+4,by=bird.y+4,bw=bird.w-8,bh=bird.h-8;
  if(by+bh>=gy||by<=0)return true;
  for(const p of pipes){if(bx+bw>p.x&&bx<p.x+PIPE_WIDTH&&by<p.topH)return true;if(bx+bw>p.x&&bx<p.x+PIPE_WIDTH&&by+bh>p.topH+PIPE_GAP)return true;}
  return false;
}

function update(dt){
  if(state!==STATE.PLAYING)return;
  frameCount++;bird.vel+=GRAVITY*dt;if(bird.vel>MAX_FALL)bird.vel=MAX_FALL;bird.y+=bird.vel*dt;
  groundX-=PIPE_SPEED*dt;if(groundX<=-20)groundX=0;
  pipeTimer+=dt;if(pipeTimer>=PIPE_FREQ){pipeTimer=0;const ch=canvas.height,gy=ch-GROUND_H,minTop=60,maxTop=gy-PIPE_GAP-60;pipes.push({x:canvas.width,topH:minTop+Math.random()*(maxTop-minTop),scored:false});}
  pipes.forEach(p=>{p.x-=PIPE_SPEED*dt;if(!p.scored&&p.x+PIPE_WIDTH<bird.x){p.scored=true;score++;playSound('score');spawnParticles(bird.x+bird.w,bird.y+bird.h/2,6,'#ffdd44');}});
  pipes=pipes.filter(p=>p.x+PIPE_WIDTH>-10);
  if(checkCollision()){state=STATE.GAMEOVER;playSound('hit');flashAlpha=.7;shakeDur=12;spawnParticles(bird.x+bird.w/2,bird.y+bird.h/2,20,'#ff4466');if(score>highScore){highScore=score;localStorage.setItem('flappyEkipHS',highScore);}setTimeout(()=>showNameOverlay(score),600);}
}

function draw(){
  const cw=canvas.width,ch=canvas.height;ctx.clearRect(0,0,cw,ch);
  if(state===STATE.LOADING){ctx.fillStyle='#0a0a2e';ctx.fillRect(0,0,cw,ch);ctx.textAlign='center';ctx.font='700 18px Nunito,sans-serif';ctx.fillStyle='#00d4ff';ctx.fillText('Yükleniyor...',cw/2,ch/2);return;}
  if(state===STATE.SELECT){drawSelectScreen();return;}
  if(shakeDur>0){ctx.save();ctx.translate((Math.random()-.5)*shakeDur,(Math.random()-.5)*shakeDur);shakeDur-=.8*currentDt;}
  drawBackground();pipes.forEach(drawPipe);drawGround();drawBird();drawParticles();drawScore();drawFlash();
  if(shakeDur>0)ctx.restore();
  if(state===STATE.READY)drawReadyScreen();
  if(state===STATE.GAMEOVER){ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,cw,ch);}
  if(state===STATE.LEADERBOARD)drawLeaderboard();
}

let _lastTime=0,currentDt=1;
function gameLoop(ts){if(!_lastTime)_lastTime=ts;currentDt=Math.min((ts-_lastTime)/(1000/60),3);_lastTime=ts;update(currentDt);draw();requestAnimationFrame(gameLoop);}

function flap(){
  ensureAudio();
  if(state===STATE.READY){state=STATE.PLAYING;bird.vel=FLAP_VEL;playSound('flap');}
  else if(state===STATE.PLAYING){bird.vel=FLAP_VEL;playSound('flap');}
}

function handleSelectClick(mx,my){
  ensureAudio();
  for(const card of getCharGrid()){if(mx>=card.x&&mx<=card.x+card.w&&my>=card.y&&my<=card.y+card.h){selectedChar=card.char;playSound('select');state=STATE.READY;resetGame();initClouds();return;}}
}

function handleLeaderboardClick(mx,my){
  ensureAudio();
  if(_retryBtn&&mx>=_retryBtn.x&&mx<=_retryBtn.x+_retryBtn.w&&my>=_retryBtn.y&&my<=_retryBtn.y+_retryBtn.h){playSound('select');state=STATE.READY;resetGame();return;}
  if(_charBtn&&mx>=_charBtn.x&&mx<=_charBtn.x+_charBtn.w&&my>=_charBtn.y&&my<=_charBtn.y+_charBtn.h){playSound('select');state=STATE.SELECT;selectedChar=null;selectScroll=0;return;}
}

function getCanvasXY(e){
  const rect=canvas.getBoundingClientRect(),sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}

canvas.addEventListener('mousedown',e=>{const{x,y}=getCanvasXY(e);if(state===STATE.SELECT){handleSelectClick(x,y);return;}if(state===STATE.LEADERBOARD){handleLeaderboardClick(x,y);return;}flap();});
canvas.addEventListener('mousemove',e=>{if(state!==STATE.SELECT)return;const{x,y}=getCanvasXY(e);selectHover=-1;getCharGrid().forEach(card=>{if(x>=card.x&&x<=card.x+card.w&&y>=card.y&&y<=card.y+card.h)selectHover=card.index;});});

canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const{x,y}=getCanvasXY(t);touchStartY=t.clientY;if(state===STATE.SELECT){handleSelectClick(x,y);return;}if(state===STATE.LEADERBOARD){handleLeaderboardClick(x,y);return;}flap();},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(state===STATE.SELECT){const dy=e.touches[0].clientY-touchStartY;touchStartY=e.touches[0].clientY;const rows=Math.ceil(characters.length/3),totalH=rows*146,maxScroll=Math.max(0,totalH-(canvas.height-240));selectScroll=Math.min(0,Math.max(-maxScroll,selectScroll+dy));}},{passive:false});
canvas.addEventListener('wheel',e=>{if(state!==STATE.SELECT)return;const rows=Math.ceil(characters.length/3),totalH=rows*146,maxScroll=Math.max(0,totalH-(canvas.height-240));selectScroll=Math.min(0,Math.max(-maxScroll,selectScroll-e.deltaY*.5));});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(state===STATE.LEADERBOARD){ensureAudio();playSound('select');state=STATE.READY;resetGame();return;}flap();}
  if(e.code==='Escape'&&(state===STATE.READY||state===STATE.LEADERBOARD)){ensureAudio();state=STATE.SELECT;selectedChar=null;selectScroll=0;}
});

function init(){state=STATE.SELECT;initStars();initClouds();resetGame();fetchLeaderboard();gameLoop();}
if(loadedCount>=totalAssets)init();
</script>
